services:
  postgres:
    image: postgres:16-alpine
    container_name: lupa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lupa_federal}
      POSTGRES_USER: ${POSTGRES_USER:-lupa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lupa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - lupa_postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  lupa_postgres_data:
