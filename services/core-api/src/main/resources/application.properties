spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:lupa_federal}
spring.datasource.username=${POSTGRES_USER:lupa}
spring.datasource.password=${POSTGRES_PASSWORD:lupa}

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration